services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-monitor}
      POSTGRES_USER:     ${POSTGRES_USER:-monitor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monitor -d monitor"]
      interval: 5s
      timeout:  5s
      retries:  10

  # ── Sentinel Server ──────────────────────────────────────────────────────────
  server:
    build:
      context:    .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-monitor}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-monitor}
    depends_on:
      db:
        condition: service_healthy

    # Direct exposure mode (no reverse proxy): set PUBLISH_PORT=9000 (or any host port).
    ports:
      - "${PUBLISH_PORT:-}:9000"

    # Traefik mode: set TRAEFIK_ENABLE=true and attach to external network.
    networks:
      - default
      - traefik
    labels:
      - traefik.enable=${TRAEFIK_ENABLE:-false}
      - traefik.docker.network=${TRAEFIK_NETWORK:-traefik}
      - traefik.http.routers.sentinel.rule=Host(`${TRAEFIK_HOST:-sentinel.example.com}`)
      - traefik.http.routers.sentinel.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}
      - traefik.http.routers.sentinel.tls=true
      - traefik.http.routers.sentinel.tls.certresolver=${TRAEFIK_CERTRESOLVER:-cloudflare}
      - traefik.http.services.sentinel.loadbalancer.server.port=9000

volumes:
  pgdata:

networks:
  traefik:
    external: true
